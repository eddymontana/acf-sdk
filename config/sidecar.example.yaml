# sidecar.example.yaml — documented configuration template.
# Copy to sidecar.yaml and adjust for your environment.
# sidecar.yaml is gitignored — never commit secrets.

socket_path: /tmp/acf.sock        # UDS socket path

policy_dir: ./policies/v1         # directory containing Rego files and data/

log_level: info                   # debug | info | warn | error

otel:
  enabled: false                  # set true to emit OTel spans
  endpoint: ""                    # e.g. http://localhost:4318/v1/traces (OTLP HTTP)
  service_name: acf-sidecar

# HMAC key is loaded from the ACF_HMAC_KEY environment variable at startup.
# Minimum 32 bytes, base64-encoded.
# Generate: python3 -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
